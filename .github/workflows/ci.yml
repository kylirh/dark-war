name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (client + server)
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build (TypeScript + bundles)
        run: npm run build:ts
