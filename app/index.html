<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Dark War" />
    <title>Dark War</title>
    <link rel="icon" type="image/png" href="assets/img/app-icon.png" />
    <link rel="stylesheet" href="assets/css/system.css" />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <div id="retro-window-chrome" class="retro-window-chrome">
      <div class="retro-titlebar">
        <div class="retro-traffic-lights">
          <button
            class="retro-window-button retro-window-button-close"
            id="retro-btn-close"
            type="button"
            title="Close"
            aria-label="Close"
          >
            <span>X</span>
          </button>
          <button
            class="retro-window-button retro-window-button-minimize"
            id="retro-btn-minimize"
            type="button"
            title="Minimize"
            aria-label="Minimize"
          >
            <span>-</span>
          </button>
          <button
            class="retro-window-button retro-window-button-fullscreen"
            id="retro-btn-fullscreen"
            type="button"
            title="Fullscreen"
            aria-label="Fullscreen"
          >
            <span>[]</span>
          </button>
        </div>
        <div class="retro-title-stripes"></div>
        <div class="retro-window-title">Dark War</div>
        <div class="retro-title-stripes"></div>
      </div>
      <div class="retro-content-frame"></div>
    </div>
    <div class="resize-handle" data-edge="top"></div>
    <div class="resize-handle" data-edge="bottom"></div>
    <div class="resize-handle" data-edge="left"></div>
    <div class="resize-handle" data-edge="right"></div>
    <div class="resize-handle" data-edge="top-left"></div>
    <div class="resize-handle" data-edge="top-right"></div>
    <div class="resize-handle" data-edge="bottom-left"></div>
    <div class="resize-handle" data-edge="bottom-right"></div>
    <div class="app-container">
      <div class="game-area">
        <div id="hp-overlay" class="hp-overlay">
          <div class="hp-bar-outer">
            <div id="hpbar" class="hp-bar-inner" style="--hp-width: 100%"></div>
          </div>
          <span id="hp" class="hp-overlay-text">—</span>
        </div>
        <div class="viewport">
          <canvas
            id="game"
            width="2080"
            height="1184"
            aria-label="Game Canvas"
            role="img"
          ></canvas>
          <div id="game-over-overlay" class="game-over-overlay">
            <div class="game-over-content">
              <h1 class="game-over-text">GAME OVER</h1>
              <h2 class="game-over-score" id="game-over-score">Score: 0</h2>
              <button
                class="new-game-button"
                id="new-game-button"
                type="button"
              >
                New Game
              </button>
            </div>
          </div>
        </div>
      </div>

      <aside class="sidebar" id="sidebar">
        <section class="status panel">
          <h2>Status</h2>
          <div class="stats-grid">
            <div class="stat-row">
              <span class="stat-label">Region</span>
              <span class="stat-value" id="floor">1</span>
            </div>
            <div class="stat-row">
              <span class="stat-label">Score</span>
              <span class="stat-value" id="score">0</span>
            </div>
            <div id="ctdm-section" style="display: none">
              <div class="stat-row ctdm-stat">
                <span class="stat-label">CTDM</span>
                <span class="stat-value" id="ctdm-status">ON</span>
              </div>
              <div
                class="ctdm-bar"
                id="ctdmbar"
                style="--ctdm-width: 100%; --ctdm-threat: 0"
              >
                <span class="ctdm-bar-fill"></span>
              </div>
            </div>
          </div>
        </section>

        <section class="inventory panel">
          <h2>Inventory</h2>
          <div id="inventory"></div>
        </section>

        <section class="message-log panel">
          <h2>Message Log</h2>
          <ul id="log"></ul>
        </section>

      </aside>
      <button
        class="sidebar-toggle"
        id="sidebarToggle"
        aria-label="Toggle sidebar"
        title="Toggle sidebar"
      >
        ▶
      </button>
    </div>

    <script src="game.js"></script>
    <script>
      const sidebar = document.getElementById("sidebar");
      const sidebarToggle = document.getElementById("sidebarToggle");

      sidebarToggle.addEventListener("click", () => {
        const isCollapsed = sidebar.classList.toggle("collapsed");
        sidebarToggle.textContent = isCollapsed ? "◀" : "▶";
        sidebarToggle.setAttribute(
          "aria-label",
          isCollapsed ? "Show Sidebar" : "Hide Sidebar",
        );
      });

      (function () {
        const hpOverlay = document.getElementById("hp-overlay");
        document.addEventListener("mousemove", (e) => {
          const rect = hpOverlay.getBoundingClientRect();
          const hovered =
            e.clientX >= rect.left &&
            e.clientX <= rect.right &&
            e.clientY >= rect.top &&
            e.clientY <= rect.bottom;
          hpOverlay.classList.toggle("hovered", hovered);
        });
      })();
    </script>
  </body>
</html>
