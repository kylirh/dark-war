<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Dark War" />
  <title>Dark War</title>
  <link rel="icon" type="image/png" href="assets/img/app-icon.png" />
  <link rel="stylesheet" href="assets/css/system.css" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>
  <div id="retro-window-chrome" class="retro-window-chrome">
    <div class="retro-titlebar">
      <div class="retro-traffic-lights">
        <button class="retro-window-button retro-window-button-close" id="retro-btn-close" type="button" title="Close"
          aria-label="Close">
          <span>X</span>
        </button>
        <button class="retro-window-button retro-window-button-minimize" id="retro-btn-minimize" type="button"
          title="Minimize" aria-label="Minimize">
          <span>-</span>
        </button>
        <button class="retro-window-button retro-window-button-fullscreen" id="retro-btn-fullscreen" type="button"
          title="Fullscreen" aria-label="Fullscreen">
          <span>[]</span>
        </button>
      </div>
      <div class="retro-title-stripes"></div>
      <div class="retro-window-title">Dark War</div>
      <div class="retro-title-stripes"></div>
    </div>
    <div class="retro-content-frame"></div>
  </div>
  <div class="resize-handle" data-edge="top"></div>
  <div class="resize-handle" data-edge="bottom"></div>
  <div class="resize-handle" data-edge="left"></div>
  <div class="resize-handle" data-edge="right"></div>
  <div class="resize-handle" data-edge="top-left"></div>
  <div class="resize-handle" data-edge="top-right"></div>
  <div class="resize-handle" data-edge="bottom-left"></div>
  <div class="resize-handle" data-edge="bottom-right"></div>
  <div class="app-container">
    <div class="game-area">
      <div id="hp-overlay" class="hp-overlay">
        <div class="hp-bar-outer">
          <div id="hpbar" class="hp-bar-inner" style="--hp-width: 100%"></div>
        </div>
        <span id="hp" class="hp-overlay-text">—</span>
      </div>
      <!-- Inventory bar is injected by InventoryBar component before .viewport -->
      <div class="viewport">
        <canvas id="game" width="2080" height="1184" aria-label="Game Canvas" role="img"></canvas>
      </div>

      <div id="game-over-overlay" class="game-over-overlay">
        <div class="game-over-content">
          <h1 class="game-over-text">GAME OVER</h1>
          <h2 class="game-over-score" id="game-over-score">Score: 0</h2>
          <button class="new-game-button" id="new-game-button" type="button">
            New Game
          </button>
        </div>
      </div>

      <!-- Story overlay: floating CRT terminal over game -->
      <div id="story-overlay" class="story-overlay" aria-live="polite" aria-label="Story">
        <div id="story-panel" class="story-panel">
          <!-- Expand/collapse button — upper-right corner of glass pane -->
          <button id="story-expand-tab" class="story-expand-tab" type="button" aria-label="Toggle story">
            <span class="story-tab-label">+</span>
          </button>
          <div id="story-scroll" class="story-scroll">
            <ul id="story" class="story-messages"></ul>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
  <script>
    (function () {
      const hpOverlay = document.getElementById("hp-overlay");
      document.addEventListener("mousemove", (e) => {
        const rect = hpOverlay.getBoundingClientRect();
        const hovered =
          e.clientX >= rect.left &&
          e.clientX <= rect.right &&
          e.clientY >= rect.top &&
          e.clientY <= rect.bottom;
        hpOverlay.classList.toggle("hovered", hovered);
      });
    })();

    // ── Story overlay expand/collapse ────────────────────────
    const storyOverlay = document.getElementById("story-overlay");
    const storyPanel = document.getElementById("story-panel");
    const storyScroll = document.getElementById("story-scroll");
    const storyExpandTab = document.getElementById("story-expand-tab");
    const storyTabLabel = storyExpandTab.querySelector(".story-tab-label");
    const gameArea = storyOverlay.closest(".game-area");

    let storyExpanded = false;

    function setStoryHeight() {
      if (storyExpanded) {
        // Panel top at 8px, overlay bottom at 30px → height = H − 38
        const h = gameArea.clientHeight - 38;
        storyPanel.style.height = Math.max(200, h) + "px";
      } else {
        storyPanel.style.height = "";
      }
    }

    storyExpandTab.addEventListener("click", () => {
      storyExpanded = !storyExpanded;
      storyOverlay.classList.toggle("expanded", storyExpanded);
      storyTabLabel.textContent = storyExpanded ? "−" : "+";
      setStoryHeight();
      // On expand: jump to newest immediately
      if (storyExpanded) {
        storyScroll.scrollTop = storyScroll.scrollHeight;
      }
      // Remove focus ring so the button doesn't stay highlighted after click
      storyExpandTab.blur();
    });

    // On collapse: wait for the height transition to finish before scrolling
    // to bottom — setting scrollTop during the animation doesn't stick reliably.
    storyPanel.addEventListener("transitionend", (e) => {
      if (e.propertyName === "height" && !storyExpanded) {
        storyScroll.scrollTop = storyScroll.scrollHeight;
      }
    });

    window.addEventListener("resize", () => {
      if (storyExpanded) setStoryHeight();
    });
  </script>
</body>

</html>
